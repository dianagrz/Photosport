<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Editar portafolio</title>
    <link rel="stylesheet" href="../../Assets/CSS/style.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="photographer-theme">
    <div class="dashboard-layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <h2>📷 PhotoSport</h2>

            <ul>
                <li><a href="home_photographer.html"><i class="fa-solid fa-house-user"></i> Control de estudio</a></li>
                <li><a href="mis-eventos.html"><i class="fa-solid fa-calendar"></i> Eventos</a></li>
                <li><a href="paquetes.html"><i class="fa-solid fa-box"></i> Paquetes</a></li>
                <li><a href="preview-portafolio.html"><i class="fa-solid fa-camera"></i> Mi Portafolio</a></li>
                <li><a href="estadisticas.html"><i class="fa-solid fa-chart-column"></i> Mis Estadísticas</a></li>
                <li><a href="../index.html"><i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión</a></li>
            </ul>
        </aside>

        <!-- CONTENIDO -->
        <main class="dashboard-main">
            <div class="head">
                <a href="preview-portafolio.html" class="btn-inscribir"><i class="fa-solid fa-arrow-left"></i></a>
                <h1>Editar portafolio</h1>
            </div>
            <p>Agrega o elimina fotos de tu portafolio.</p>

            <!-- SUBIR FOTOS -->
            <div class="subir-fotos">
                <label>Seleccionar nuevas fotos</label>
                <form id="subir_fotos">
                    <input type="file" accept="image/*" multiple required name="fotos">
                    <button type="submit">Subir fotos</button>
                </form>
            </div>

            <!-- GALERIA EDITABLE -->
            <h2>Fotos actuales</h2>
            <div class="galeria-editar" id="imagenes">
                <div class="foto-item" data-id="1">
                    <img src="img/foto1.jpg">
                    <button class="btn-eliminar" data-accion="borrar"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
        </main>
    </div>
</body>
<script src="../../Assets/JS/page-binding.js?v=12"></script>
<script src="../../Assets/JS/PhotographerJS/editar_protafolio.js?v=8"></script>
</html>
