<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Editar perfil</title>
    <link rel="stylesheet" href="../../Assets/CSS/style.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="photographer-theme">
    <div class="dashboard-layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <h2>📷 PhotoSport</h2>

            <ul>
                <li><a href="home_photographer.html"><i class="fa-solid fa-house-user"></i> Control de estudio</a></li>
                <li><a href="mis-eventos.html"><i class="fa-solid fa-calendar"></i> Eventos</a></li>
                <li><a href="paquetes.html"><i class="fa-solid fa-box"></i> Paquetes</a></li>
                <li><a href="preview-portafolio.html"><i class="fa-solid fa-camera"></i> Mi Portafolio</a></li>
                <li><a href="estadisticas.html"><i class="fa-solid fa-chart-column"></i> Mis Estadísticas</a></li>
                <li><a href="../index.html"><i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión</a></li>
            </ul>
        </aside>

        <!-- CONTENIDO -->
        <main class="dashboard-main">
            <div class="head">
                <a href="preview-portafolio.html" class="btn-inscribir"><i class="fa-solid fa-arrow-left"></i></a>
                <h1>Editar perfil</h1>
            </div>
            <p>Completa/Edita los campos para crear tu perfil profesional.</p>

            <form id="formulario" class="form-perfil">
                <label>Nombre</label>
                <input type="text" placeholder="Nombre" required name="nombre" id="nombre">

                <label>Apellido</label>
                <input type="text" placeholder="Apellido" required name="apellido" id="apellido">

                <label>Correo electrónico</label>
                <input type="email" placeholder="ejemplo@email.com" required name="correo" id="correo">

                <label>Teléfono</label>
                <input type="tel" placeholder="Número de teléfono" required name="tel" id="tel">

                <label>Especialidad</label>
                <input type="text" placeholder="Ej. Fotografía deportiva" required name="especial" id="especial">

                <label>Años de experiencia</label>
                <input type="number" placeholder="Ej. 5" required name="expo" id="expo">

                <label>Sobre ti</label>
                <input type="text" placeholder="Describe tu experiencia como fotógrafo" required name="sobre" id="sobre">

                <label>Foto de perfil</label>
                <input type="file" id="profilePic" name="fotos" accept="image/*">
                <input type="hidden" id="fotoPerfilUrl" name="foto">

                <button type="submit">Guardar perfil</button>
            </form>
        </main>
    </div>
</body>
<script src="../../Assets/JS/page-binding.js?v=5"></script>
<script src="../../Assets/JS/PhotographerJS/crear_perfil.js?v=5"></script>
</html>
