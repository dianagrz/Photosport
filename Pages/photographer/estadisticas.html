<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Estadísticas</title>
    <link rel="stylesheet" href="../../Assets/CSS/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="photographer-theme">
    <div class="dashboard-layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <h2>📷 PhotoSport</h2>

            <ul>
                <li><a href="home_photographer.html"><i class="fa-solid fa-house-user"></i> Control de estudio</a></li>
                <li><a href="mis-eventos.html"><i class="fa-solid fa-calendar"></i> Eventos</a></li>
                <li><a href="paquetes.html"><i class="fa-solid fa-box"></i> Paquetes</a></li>
                <li><a href="preview-portafolio.html"><i class="fa-solid fa-camera"></i> Mi Portafolio</a></li>
                <li><a href="estadisticas.html"><i class="fa-solid fa-chart-column"></i> Mis Estadísticas</a></li>
                <li><a href="../index.html"><i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión</a></li>
            </ul>
        </aside>


    <!-- CONTENIDO -->
        <main class="dashboard-main">
            <section class="estadisticas">
                <h1>Estadísticas</h1>

                <div class="stats-cards">
                    <div class="stat-card">
                        <h3>Ingresos totales</h3>
                        <p id="ingreso"></p>
                    </div>

                    <div class="stat-card">
                        <h3>Clientes atendidos</h3>
                        <p id="clientes"></p>
                    </div>

                    <div class="stat-card">
                        <h3>Eventos cubiertos</h3>
                        <p id="eventos-cubiertos"></p>
                    </div>
                </div>


                <!-- GRAFICA -->
                <div class="grafica-container">
                    <h2>Ingresos por mes</h2>
                    <canvas id="graficaIngresos"></canvas>
                </div>

                <!-- TABLA EVENTOS -->
                <div class="tabla-eventos">
                    <h2>Ingreso por competencia</h2>

                    <table>
                        <thead>
                            <tr>
                                <th>Evento</th>
                                <th>Clientes</th>
                                <th>Ingresos</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-eventos"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
</body>
<script src="../../Assets/JS/page-binding.js?v=12"></script>
<script src="../../Assets/JS/PhotographerJS/estadisticas.js?v=3"></script>
</html>
